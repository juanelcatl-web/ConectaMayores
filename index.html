<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conectados!</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075e54">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1581579438747-1dc8d17bbce4?q=80&w=512&auto=format&fit=crop">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #e5ddd5; overflow-x: hidden; }
        .bg-wa { background: #075e54; }
        .bg-wa-light { background: #128c7e; }
        .step-hidden { display: none; }
        .chat-item { transition: background 0.2s; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        #chat-messages { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }
        .btn-report { color: #ef4444; font-size: 10px; font-weight: bold; border: 1px solid #ef4444; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center p-6 overflow-y-auto">
        <div class="max-w-sm w-full text-center space-y-6 py-8">
            <img src="https://images.unsplash.com/photo-1581579438747-1dc8d17bbce4?q=80&w=512&auto=format&fit=crop" class="w-32 h-32 mx-auto rounded-full shadow-xl mb-2 object-cover border-4 border-emerald-100">
            <h1 class="text-3xl font-black text-[#075e54] italic uppercase">Conectados!</h1>
            
            <div id="auth-container" class="bg-white p-8 rounded-3xl shadow-2xl border border-gray-100 text-left">
                <div id="step-phone">
                    <p class="text-gray-500 mb-6 text-sm">Ingresa tu <b>WhatsApp</b> para entrar al círculo.</p>
                    <div class="flex gap-3 mb-8">
                        <div class="border-b-2 border-gray-300 py-3 text-gray-400 font-bold">+54</div>
                        <input type="number" id="userPhone" placeholder="Número con área" class="w-full border-b-2 border-[#075e54] outline-none py-3 text-lg">
                    </div>
                    <button onclick="prepareSurvey()" class="w-full bg-[#25d366] text-white py-4 rounded-2xl font-black uppercase shadow-lg">Continuar</button>
                </div>

                <div id="step-survey" class="step-hidden space-y-5">
                    <p class="text-[10px] text-indigo-600 font-black uppercase tracking-widest">🛡️ Verificación Humana</p>
                    <input type="text" id="userName" class="w-full border-b-2 border-[#075e54] py-2 outline-none" placeholder="¿Tu nombre?">
                    <div id="random-questions" class="space-y-4"></div>
                    <button onclick="finishAuth()" class="w-full bg-wa text-white py-4 rounded-2xl font-black uppercase shadow-xl mt-4">Validar e Ingresar</button>
                </div>
            </div>
            <button id="installBtn" class="hidden w-full bg-emerald-50 text-emerald-700 py-3 rounded-xl font-bold uppercase text-[10px] border border-emerald-200">📥 Descargar App</button>
        </div>
    </div>

    <div id="app-content" class="hidden h-screen flex flex-col">
        <header class="bg-wa text-white pt-4 shadow-lg">
            <div class="px-4 flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold italic">Conectados!</h1>
                <div class="flex gap-5 text-xl"><span onclick="logout()">🚪</span><span>⋮</span></div>
            </div>
            <div class="flex text-center font-bold text-xs uppercase tracking-wider">
                <div class="flex-1 py-3 border-b-4 border-white">Salas de Interés</div>
            </div>
        </header>

        <div id="view-list" class="flex-1 bg-white overflow-y-auto pb-20"></div>

        <div id="view-chat" class="hidden flex-1 flex flex-col fixed inset-0 z-50 bg-[#e5ddd5]">
            <div class="bg-wa text-white p-3 flex items-center gap-3 shadow-md">
                <span onclick="closeChat()" class="text-2xl mr-2">←</span>
                <div id="chat-icon" class="w-10 h-10 rounded-full flex items-center justify-center bg-white/20 text-xl"></div>
                <div class="flex-1"><h2 id="chat-title" class="font-bold text-sm"></h2></div>
                <button onclick="alert('Reporte enviado')" class="btn-report">REPORTAR</button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col"></div>
            <footer class="p-2 bg-[#f0f0f0] flex items-center gap-2">
                <input type="text" id="msgInput" placeholder="Escribe un mensaje..." class="flex-1 p-3 rounded-full outline-none bg-white">
                <button onclick="sendMsg()" class="bg-[#128c7e] text-white w-12 h-12 rounded-full flex items-center justify-center">➤</button>
            </footer>
        </div>
    </div>

    <script>
        const bancoPreguntas = [
            "¿Qué poníamos encima del Wincofón?", "¿De qué marca eran las pastillas del tubito?", 
            "¿Qué se hacía con el sifón de vidrio vacío?", "¿Qué era la 'carta de ajuste'?",
            "¿Cómo se llamaba el aparato de diapositivas?", "¿Qué golosina era un cubanito?",
            "¿Qué usaban los hombres para peinarse?", "¿Qué marca de jeans era famosa?",
            "¿Para qué servía el carbón en la plancha?", "¿Cómo se llamaba el jabón de pan?"
        ];

        const salas = [
            {t: "Círculo General", i: "🤝", c: "emerald"}, {t: "Recetas y Cocina", i: "🍳", c: "orange"},
            {t: "Automóviles Clásicos", i: "🚗", c: "blue"}, {t: "Viajes y Paseos", i: "🚌", c: "purple"},
            {t: "Huerta y Jardín", i: "🌿", c: "green"}, {t: "Tango y Folklore", i: "💃", c: "red"},
            {t: "Tejido y Costura", i: "🧶", c: "pink"}, {t: "Salud y Bienestar", i: "🍎", c: "rose"},
            {t: "Cine y Series", i: "🎬", c: "slate"}, {t: "Libros y Poesía", i: "📚", c: "yellow"},
            {t: "Mascotas", i: "🐶", c: "orange"}, {t: "Nietos y Familia", i: "👧", c: "cyan"},
            {t: "Juegos y Puzzles", i: "🧩", c: "indigo"}, {t: "Tecnología Fácil", i: "📱", c: "gray"},
            {t: "Recuerdos de Barrio", i: "🏘️", c: "amber"}
        ];

        window.onload = () => {
            if(localStorage.getItem('conectados_user')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadSalas();
            }
        };

        function prepareSurvey() {
            if(document.getElementById('userPhone').value.length < 8) return alert("Número inválido");
            document.getElementById('step-phone').classList.add('step-hidden');
            document.getElementById('step-survey').classList.remove('step-hidden');
            const randoms = bancoPreguntas.sort(() => 0.5 - Math.random()).slice(0, 3);
            document.getElementById('random-questions').innerHTML = randoms.map(q => `
                <input type="text" class="input-survey w-full border-b py-2 outline-none text-sm" placeholder="${q}">
            `).join('');
        }

        function finishAuth() {
            const name = document.getElementById('userName').value;
            if(!name) return alert("Dinos tu nombre");
            localStorage.setItem('conectados_user', name);
            location.reload();
        }

        function loadSalas() {
            document.getElementById('view-list').innerHTML = salas.map(s => `
                <div onclick="openChat('${s.t}', '${s.i}')" class="chat-item flex items-center p-4 gap-4">
                    <div class="w-14 h-14 bg-${s.c}-500 rounded-full flex items-center justify-center text-2xl text-white shadow-sm">${s.i}</div>
                    <div class="flex-1"><h3 class="font-bold text-gray-800">${s.t}</h3><p class="text-[10px] text-gray-400">Toca para conversar</p></div>
                </div>
            `).join('');
        }

        function openChat(title, icon) {
            document.getElementById('view-chat').classList.remove('hidden');
            document.getElementById('chat-title').innerText = title;
            document.getElementById('chat-icon').innerText = icon;
            document.getElementById('chat-messages').innerHTML = `<div class="bg-white/80 p-2 rounded-lg text-center text-[10px] mb-4">Bienvenido a ${title}</div>`;
        }

        function closeChat() { document.getElementById('view-chat').classList.add('hidden'); }

        function sendMsg() {
            const val = document.getElementById('msgInput').value;
            if(!val) return;
            document.getElementById('chat-messages').innerHTML += `<div class="bg-[#dcf8c6] p-3 rounded-lg shadow-sm max-w-[85%] self-end ml-auto mb-1"><p class="text-xs font-bold text-emerald-700">Yo</p><p>${val}</p></div>`;
            document.getElementById('msgInput').value = "";
        }

        function logout() { localStorage.clear(); location.reload(); }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });
        document.getElementById('installBtn').addEventListener('click', () => { if(deferredPrompt) deferredPrompt.prompt(); });
    </script>
</body>
                                                    </html>
