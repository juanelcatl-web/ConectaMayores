<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conectados!</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075e54">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #e5ddd5; }
        .bg-wa { background: #075e54; }
        .bg-wa-light { background: #128c7e; }
        .step-hidden { display: none; }
        .tab-active { border-bottom: 4px solid white; opacity: 1 !important; }
        #chat-messages { 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-attachment: fixed; 
        }
        .bubble-in { background: white; align-self: flex-start; border-radius: 0 15px 15px 15px; }
        .bubble-out { background: #dcf8c6; align-self: flex-end; border-radius: 15px 0 15px 15px; }
        .quick-emoji { background: white; border: 1px solid #ddd; padding: 5px 10px; border-radius: 20px; font-size: 1.2rem; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center p-6 overflow-y-auto">
        <div class="max-w-sm w-full text-center space-y-6 py-8">
            <img src="https://images.unsplash.com/photo-1581579438747-1dc8d17bbce4?q=80&w=512&auto=format&fit=crop" class="w-32 h-32 mx-auto rounded-full shadow-xl object-cover border-4 border-emerald-100">
            <h1 class="text-3xl font-black text-[#075e54] italic uppercase">Conectados!</h1>
            <div class="bg-white p-8 rounded-3xl shadow-2xl border border-gray-100 text-left">
                <div id="step-phone">
                    <p class="text-gray-500 mb-4 text-sm font-bold">Introduce tu WhatsApp:</p>
                    <input type="number" id="userPhone" placeholder="Ej: 1123445566" class="w-full border-b-2 border-[#075e54] outline-none py-3 text-lg mb-6">
                    <button onclick="prepareSurvey()" class="w-full bg-[#25d366] text-white py-4 rounded-2xl font-bold uppercase shadow-lg">Continuar</button>
                </div>
                <div id="step-survey" class="step-hidden space-y-4">
                    <input type="text" id="userName" class="w-full border-b-2 border-[#075e54] py-2 outline-none" placeholder="¿Cómo te llamas?">
                    <div id="random-questions" class="space-y-2"></div>
                    <button onclick="finishAuth()" class="w-full bg-wa text-white py-4 rounded-2xl font-bold uppercase">Entrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden h-screen flex flex-col">
        <header class="bg-wa text-white pt-4 shadow-lg">
            <div class="px-4 flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold italic tracking-tighter">Conectados!</h1>
                <div class="flex gap-4 text-xl"><span onclick="logout()">🚪</span></div>
            </div>
            <div class="flex text-center font-bold text-xs uppercase">
                <div id="btn-tab-salas" class="flex-1 py-3 tab-active" onclick="switchTab('salas')">Salas</div>
                <div id="btn-tab-estados" class="flex-1 py-3 opacity-60" onclick="switchTab('estados')">Novedades</div>
            </div>
        </header>

        <div id="view-list" class="flex-1 bg-white overflow-y-auto pb-20"></div>

        <div id="view-estados" class="hidden flex-1 bg-white p-4">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <p class="text-blue-800 font-bold italic">"La familia no siempre es de sangre, es la gente que te quiere en su vida."</p>
                <p class="text-[10px] text-blue-400 mt-2">Reflexión del día</p>
            </div>
        </div>

        <div id="view-chat" class="hidden flex-1 flex flex-col fixed inset-0 z-50 bg-[#e5ddd5]">
            <div class="bg-wa text-white p-3 flex items-center gap-3">
                <span onclick="closeChat()" class="text-2xl">←</span>
                <div id="chat-icon" class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-xl"></div>
                <div class="flex-1"><h2 id="chat-title" class="font-bold text-sm"></h2><p class="text-[9px] opacity-70">en línea</p></div>
                <button onclick="clearRoomHistory()" class="text-[8px] border px-2 py-1 rounded">BORRAR</button>
            </div>
            
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col"></div>

            <div class="px-2 py-1 flex gap-2 overflow-x-auto bg-gray-100/50">
                <button onclick="quickSend('👍')" class="quick-emoji">👍</button>
                <button onclick="quickSend('❤️')" class="quick-emoji">❤️</button>
                <button onclick="quickSend('🙏')" class="quick-emoji">🙏</button>
                <button onclick="quickSend('👏')" class="quick-emoji">👏</button>
                <button onclick="quickSend('Buen día! ☕')" class="text-xs bg-white px-3 py-1 rounded-full border">Buen día! ☕</button>
            </div>

            <footer class="p-2 bg-[#f0f0f0] flex items-center gap-2">
                <label class="w-10 h-10 flex items-center justify-center bg-gray-300 rounded-full cursor-pointer">
                    📷<input type="file" accept="image/*" class="hidden" onchange="sendPhoto(this)">
                </label>
                <input type="text" id="msgInput" placeholder="Escribe un mensaje..." class="flex-1 p-3 rounded-full outline-none">
                <button onclick="sendMsg()" class="bg-[#128c7e] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg">➤</button>
            </footer>
        </div>
    </div>

    <script>
        let currentRoom = "";
        const salas = [
            {t: "Círculo General", i: "🤝", c: "emerald"}, {t: "Recetas y Cocina", i: "🍳", c: "orange"},
            {t: "Huerta y Jardín", i: "🌿", c: "green"}, {t: "Tango y Folklore", i: "💃", c: "red"},
            {t: "Recuerdos de Barrio", i: "🏘️", c: "amber"}, {t: "Salud y Bienestar", i: "🍎", c: "rose"}
        ];

        window.onload = () => {
            if(localStorage.getItem('conectados_user')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadSalas();
            }
        };

        function prepareSurvey() {
            if(document.getElementById('userPhone').value.length < 8) return alert("Número inválido");
            document.getElementById('step-phone').classList.add('step-hidden');
            document.getElementById('step-survey').classList.remove('step-hidden');
            document.getElementById('random-questions').innerHTML = `<input type="text" class="w-full border-b py-2 outline-none text-sm" placeholder="¿Qué era el Winco?">`;
        }

        function finishAuth() {
            localStorage.setItem('conectados_user', document.getElementById('userName').value);
            location.reload();
        }

        function loadSalas() {
            document.getElementById('view-list').innerHTML = salas.map(s => `
                <div onclick="openChat('${s.t}', '${s.i}')" class="flex items-center p-4 gap-4 border-b bg-white chat-item">
                    <div class="w-14 h-14 bg-${s.c}-500 rounded-full flex items-center justify-center text-2xl text-white">${s.i}</div>
                    <div class="flex-1"><h3 class="font-bold text-gray-800">${s.t}</h3><p class="text-xs text-gray-400">Toca para conversar</p></div>
                    <span class="text-[10px] text-gray-300">12:00</span>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            const isSalas = tab === 'salas';
            document.getElementById('view-list').classList.toggle('hidden', !isSalas);
            document.getElementById('view-estados').classList.toggle('hidden', isSalas);
            document.getElementById('btn-tab-salas').classList.toggle('tab-active', isSalas);
            document.getElementById('btn-tab-estados').classList.toggle('tab-active', !isSalas);
        }

        function openChat(t, i) {
            currentRoom = t.replace(/\s/g, '_'); // Quitar espacios para el ID de memoria
            document.getElementById('view-chat').classList.remove('hidden');
            document.getElementById('chat-title').innerText = t;
            document.getElementById('chat-icon').innerText = i;
            loadMessages();
        }

        function loadMessages() {
            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('chat_' + currentRoom)) || [];
            history.forEach(msg => {
                displayMsg(msg.content, true, msg.type, msg.time);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMsg() {
            const val = document.getElementById('msgInput').value;
            if(!val) return;
            processMessage(val, 'text');
            document.getElementById('msgInput').value = '';
        }

        function quickSend(emoji) { processMessage(emoji, 'text'); }

        function sendPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => processMessage(e.target.result, 'photo');
                reader.readAsDataURL(input.files[0]);
            }
        }

        function processMessage(content, type) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const history = JSON.parse(localStorage.getItem('chat_' + currentRoom)) || [];
            history.push({ content, type, time });
            localStorage.setItem('chat_' + currentRoom, JSON.stringify(history));
            displayMsg(content, true, type, time);
        }

        function displayMsg(content, isMe, type, time) {
            const chat = document.getElementById('chat-messages');
            const body = type === 'text' ? `<p class="text-md">${content}</p>` : `<img src="${content}" class="rounded-lg max-w-full h-auto">`;
            
            chat.innerHTML += `
                <div class="p-3 shadow-sm max-w-[85%] mb-1 bubble-out">
                    ${body}
                    <div class="flex justify-end items-center gap-1 mt-1">
                        <span class="text-[8px] opacity-50">${time}</span>
                        <span class="text-blue-500 text-[10px]">✔✔</span>
                    </div>
                </div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function clearRoomHistory() {
            if(confirm("¿Vaciar esta sala?")) {
                localStorage.removeItem('chat_' + currentRoom);
                loadMessages();
            }
        }

        function closeChat() { document.getElementById('view-chat').classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
                    </html>
